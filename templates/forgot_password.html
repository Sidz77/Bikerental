<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Bike Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-light);
        }
        .login-container {
            position: relative;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-container h2 {
            margin-bottom: 30px;
            color: var(--text-white);
            font-size: 1.8rem;
            letter-spacing: 1px;
        }
        .flash-messages p {
            font-size: 0.9em;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        .error { background: rgba(220, 53, 69, 0.2); color: #dc3545; border: 1px solid #dc3545; }
        .success { background: rgba(40, 167, 69, 0.2); color: #28a745; border: 1px solid #28a745; }
        
        input[type="email"], input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0 20px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-white);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3);
            font-family: inherit;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 252, 241, 0.5);
        }
        .links {
            margin-top: 25px;
            font-size: 0.9em;
        }
        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: var(--text-white);
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.5rem;
            transition: color 0.3s ease;
        }
        .back-home:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <a href="{{ url_for('login') }}" class="back-home"><i class="fas fa-arrow-left"></i></a>
    <div class="login-container">
        <h2>Forgot Password</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <p class="{{ category }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('forgot_password') }}" method="post">
            <input type="email" name="email" placeholder="Enter your registered email" required>
            <button type="submit" class="login-btn">Send OTP</button>
        </form>

        <div class="links">
            <p>Remember your password? <a href="{{ url_for('login') }}">Log In</a></p>
        </div>
    </div>
</body>
</html>
