<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Bike Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-light);
            padding: 20px;
            box-sizing: border-box;
        }

        .signup-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin-bottom: 25px;
            color: var(--text-white);
            font-size: 2rem;
            letter-spacing: 1px;
            margin-top: 0;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-white);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        select option {
            background: var(--card-bg);
            color: var(--text-white);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3);
            font-family: inherit;
            margin-top: 15px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 252, 241, 0.5);
        }

        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            display: none;
            text-align: left;
            margin-bottom: 10px;
        }

        .terms {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            font-size: 0.9rem;
            gap: 8px;
        }
        
        .terms input {
            width: auto;
            accent-color: var(--primary-color);
            margin: 0;
        }

        .terms a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link {
            margin-top: 25px;
            font-size: 0.9em;
        }
        
        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .login-link a:hover {
            color: var(--text-white);
        }
        
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.5rem;
            transition: color 0.3s ease;
        }
        .back-home:hover {
            color: var(--primary-color);
        }
    </style>
</head>

<body>
    <a href="{{ url_for('base') }}" class="back-home"><i class="fas fa-arrow-left"></i></a>
    <div class="signup-container">
        <h1>Create Account</h1>
        <form id="signup-form" action="{{ url_for('register') }}" method="POST">
            <!-- CSRF Token (If using Flask-WTF) -->
            {{ csrf_token() if csrf_token else "" }}

            <input type="text" name="full_name" placeholder="Full Name" required>

            <select id="country-code" name="country_code" required>
                <option value="+1">🇺🇸 +1 (USA)</option>
                <option value="+91">🇮🇳 +91 (India)</option>
                <option value="+44">🇬🇧 +44 (UK)</option>
                <option value="+61">🇦🇺 +61 (Australia)</option>
            </select>

            <input type="tel" id="mobile" name="mobile" placeholder="Mobile Number" required>
            <span class="error-msg" id="mobile-error">Invalid mobile number format!</span>

            <input type="email" name="email" placeholder="Email Address" required>

            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="error-msg" id="password-error">Passwords do not match!</span>

            <div class="terms">
                <input type="checkbox" name="terms" required id="terms-check">
                <label for="terms-check">I agree to <a href="{{ url_for('terms') }}">Terms & Conditions</a></label>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
            <p class="login-link">Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
        </form>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            const countryCode = document.getElementById('country-code').value;
            const mobile = document.getElementById('mobile').value;
            const mobileError = document.getElementById('mobile-error');

            let phonePattern = {
                '+1': /^\d{10}$/,      // US - 10 digits
                '+91': /^\d{10}$/,     // India - 10 digits
                '+44': /^\d{10}$/,     // UK - 10 digits
                '+61': /^\d{9}$/       // Australia - 9 digits
            };

            if (!phonePattern[countryCode].test(mobile)) {
                mobileError.style.display = 'block';
                e.preventDefault(); // Prevents form submission on error
            } else {
                mobileError.style.display = 'none';
            }
        });
    </script>
</body>
</html>
